<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>NanoNerd 🧠</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      height: 100dvh;
      display: flex;
      justify-content: center;
      background: #111;
      overflow: hidden;
      font-family: "Tahoma", "Segoe UI", sans-serif;
      user-select: none;
    }

    .app-shell {
      width: 393px;
      max-width: 100vw;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      background: url('/wallpaper.jpg') center/cover no-repeat;
    }

    /* ── DESKTOP ── */
    .desktop { flex: 1; display: flex; flex-direction: row; overflow: visible; }

    /* ── ICON COLUMN ── */
    .icon-col {
      width: 78px; flex-shrink: 0;
      display: flex; flex-direction: column;
      gap: 8px; padding: 8px 3px;
      position: relative; z-index: 1;
    }

    .desk-icon {
      display: flex; flex-direction: column;
      align-items: center; gap: 3px;
      padding: 5px 3px; border-radius: 4px;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      transition: background .15s;
    }

    .desk-icon:hover  { background: rgba(49,106,197,.45); outline: 1px solid rgba(255,255,255,.5); }
    .desk-icon:active { background: rgba(49,106,197,.6); }

    .desk-icon .di-img   { width: 38px; height: 38px; object-fit: contain; filter: drop-shadow(1px 2px 3px rgba(0,0,0,.5)); }
    .desk-icon .di-emoji { font-size: 32px; line-height: 1; filter: drop-shadow(1px 2px 3px rgba(0,0,0,.5)); }

    .desk-icon .label {
      font-size: 10px; color: #fff; text-align: center;
      text-shadow: 1px 1px 2px rgba(0,0,0,.9), -1px -1px 2px rgba(0,0,0,.7);
      line-height: 1.2; word-break: break-word;
    }

    /* ── WINDOW AREA ── */
    .win-area { flex: 1; position: relative; overflow: visible; }

    /* ═══════════════════════════
       WINDOW ANIMATIONS
    ═══════════════════════════ */
    @keyframes win-open {
      from { transform: scale(.82) translateY(8px); opacity: 0; }
      to   { transform: scale(1)   translateY(0);   opacity: 1; }
    }

    @keyframes win-minimize {
      0%   { transform: scale(1,1)   translateY(0);    opacity: 1; transform-origin: bottom center; }
      100% { transform: scale(.15,.05) translateY(160px); opacity: 0; transform-origin: bottom center; }
    }

    @keyframes win-restore {
      0%   { transform: scale(.15,.05) translateY(160px); opacity: 0; transform-origin: bottom center; }
      100% { transform: scale(1,1)   translateY(0);    opacity: 1; transform-origin: bottom center; }
    }

    @keyframes win-close {
      from { transform: scale(1);   opacity: 1; }
      to   { transform: scale(.80); opacity: 0; }
    }

    @keyframes win-focus {
      0%   { box-shadow: 0 0 0 1px rgba(0,0,0,.6), 0 6px 24px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.3); }
      50%  { box-shadow: 0 0 0 2px rgba(0,160,255,.9), 0 8px 32px rgba(0,100,255,.5), inset 0 1px 0 rgba(255,255,255,.3); }
      100% { box-shadow: 0 0 0 1px rgba(0,0,0,.6), 0 6px 24px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.3); }
    }

    @keyframes maximize-pulse {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.015); }
      100% { transform: scale(1); }
    }

    /* ── XP WINDOW ── */
    .xp-win {
      position: absolute;
      top: 4px; left: 0; right: 4px; bottom: 4px;
      display: none;
      flex-direction: column;
      border-radius: 8px 8px 4px 4px;
      overflow: hidden;
      box-shadow: 0 0 0 1px rgba(0,0,0,.6), 0 6px 24px rgba(0,0,0,.55),
                  inset 0 1px 0 rgba(255,255,255,.3);
      /* Smooth maximize/restore transitions */
      transition: top .22s cubic-bezier(.2,.8,.2,1),
                  left .22s cubic-bezier(.2,.8,.2,1),
                  right .22s cubic-bezier(.2,.8,.2,1),
                  bottom .22s cubic-bezier(.2,.8,.2,1),
                  border-radius .22s ease;
      will-change: transform;
    }

    .xp-win.animating {
      /* Disable position transitions during keyframe animations */
      transition: none;
    }

    .xp-win.maximized {
      top: 0 !important;
      left: -78px !important;
      right: 0 !important;
      bottom: 0 !important;
      border-radius: 0;
    }

    .xp-win.anim-open     { animation: win-open     .22s cubic-bezier(.18,.89,.32,1.28) forwards; }
    .xp-win.anim-minimize { animation: win-minimize  .2s  ease-in  forwards; }
    .xp-win.anim-restore  { animation: win-restore   .22s cubic-bezier(.18,.89,.32,1.28) forwards; }
    .xp-win.anim-close    { animation: win-close     .16s ease-in  forwards; }
    .xp-win.anim-focus    { animation: win-focus     .3s  ease     forwards; }
    .xp-win.anim-maximize { animation: maximize-pulse .25s ease   forwards; }

    /* Luna blue title bar */
    .xp-titlebar {
      background: linear-gradient(180deg,
        #2259c8 0%, #1e4ec0 6%, #1a50c8 45%,
        #144abf 50%, #0f43b5 51%, #0d40b0 55%, #1248bc 100%);
      padding: 3px 4px 4px 7px;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0; min-height: 26px;
      border-bottom: 1px solid #0a36a0;
      cursor: grab; touch-action: none;
    }
    .xp-titlebar:active { cursor: grabbing; }

    .xp-win-title {
      display: flex; align-items: center; gap: 5px;
      color: #fff; font-size: 11px; font-weight: bold;
      text-shadow: 1px 1px 2px rgba(0,0,0,.6);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .xp-win-title img  { width: 14px; height: 14px; object-fit: contain; }
    .xp-win-title span { font-size: 13px; line-height: 1; }

    .xp-btns { display: flex; gap: 2px; flex-shrink: 0; }

    .xp-btn {
      width: 22px; height: 18px;
      border: none; border-radius: 3px;
      font-size: 10px; font-weight: bold;
      cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      color: #fff; text-shadow: 0 1px 1px rgba(0,0,0,.5);
      transition: filter .1s;
    }

    .xp-btn:hover  { filter: brightness(1.28); }
    .xp-btn:active { filter: brightness(.78); }

    .xp-btn.min, .xp-btn.max {
      background: linear-gradient(180deg, #4a9be0 0%, #2070c0 100%);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.4), 0 1px 2px rgba(0,0,0,.4);
    }

    .xp-btn.cls {
      background: linear-gradient(180deg, #e05040 0%, #c02010 100%);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.4), 0 1px 2px rgba(0,0,0,.4);
    }

    /* Window content */
    .xp-content {
      flex: 1; display: flex; flex-direction: column;
      background: #1a1f2e; overflow: hidden;
      border: 2px solid #0d40b0; border-top: none; border-radius: 0 0 4px 4px;
    }

    /* ── BROWSER WINDOW ── */
    .browser-bar {
      background: linear-gradient(180deg, #1e2840 0%, #171e30 100%);
      border-bottom: 1px solid #0d1424;
      padding: 4px 6px; display: flex; align-items: center; gap: 5px; flex-shrink: 0;
    }

    .browser-nav { display: flex; gap: 3px; }

    .browser-nav button {
      width: 24px; height: 22px;
      background: linear-gradient(180deg, #2e3a58 0%, #1e2840 100%);
      border: 1px solid #3a4a6a; border-radius: 3px;
      font-size: 11px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; color: #8892aa;
      transition: filter .12s;
    }
    .browser-nav button:hover { filter: brightness(1.3); color: #e8eaf0; }

    .browser-address {
      flex: 1; display: flex; align-items: center;
      background: #0e1422; border: 1px solid #2e3a58; border-radius: 3px;
      padding: 2px 7px; font-size: 11px; color: #00C9FF;
      cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      font-family: "Tahoma", monospace; letter-spacing: .01em;
      transition: border-color .15s;
    }
    .browser-address:hover { border-color: #00C9FF; }

    .browser-go {
      padding: 2px 8px; font-size: 13px;
      background: linear-gradient(180deg, #00b8e6 0%, #0080b0 100%);
      border: none; border-radius: 3px;
      cursor: pointer; color: #fff; font-family: "Tahoma", sans-serif;
      box-shadow: 0 1px 3px rgba(0,0,0,.4); transition: filter .12s;
    }
    .browser-go:hover { filter: brightness(1.15); }

    .browser-frame {
      flex: 1; position: relative;
      background: linear-gradient(160deg, #13192a 0%, #0e1220 100%);
      overflow: hidden;
    }
    .browser-frame iframe { width: 100%; height: 100%; border: none; display: block; }

    /* ── SITE INFO PANEL ── */
    .site-panel {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-start;
      overflow-y: auto; padding: 22px 18px 18px;
      gap: 0;
      background: linear-gradient(160deg, #13192a 0%, #0e1220 100%);
    }
    .site-panel::-webkit-scrollbar { width: 3px; }
    .site-panel::-webkit-scrollbar-thumb { background: #2e3650; border-radius: 2px; }

    .sp-hero {
      display: flex; flex-direction: column; align-items: center;
      gap: 10px; margin-bottom: 18px; text-align: center;
    }
    .sp-icon { font-size: 52px; line-height: 1; filter: drop-shadow(0 0 18px rgba(0,201,255,.35)); }
    .sp-name { font-size: 17px; font-weight: bold; color: #e8eaf0; letter-spacing: .02em; }
    .sp-tag  { font-size: 11px; color: #00C9FF; letter-spacing: .04em; text-transform: uppercase; }
    .sp-desc { font-size: 12px; color: #8892aa; line-height: 1.6; text-align: center; max-width: 260px; margin-top: 2px; }

    .sp-divider {
      width: 100%; height: 1px;
      background: linear-gradient(90deg, transparent, #2e3650 30%, #2e3650 70%, transparent);
      margin: 4px 0 16px;
    }

    .sp-features {
      width: 100%; display: flex; flex-direction: column; gap: 8px; margin-bottom: 18px;
    }
    .sp-feat {
      display: flex; align-items: flex-start; gap: 10px;
      background: rgba(46,54,80,.35); border: 1px solid #1e2840;
      border-radius: 6px; padding: 9px 11px;
    }
    .sp-feat-icon { font-size: 16px; flex-shrink: 0; line-height: 1.3; }
    .sp-feat-text { display: flex; flex-direction: column; gap: 2px; }
    .sp-feat-title { font-size: 12px; font-weight: bold; color: #e8eaf0; }
    .sp-feat-sub   { font-size: 11px; color: #8892aa; line-height: 1.4; }

    .sp-visit {
      display: inline-flex; align-items: center; gap: 7px;
      background: linear-gradient(135deg, #00a8d4 0%, #0070a0 100%);
      color: #fff; border: none; padding: 10px 26px;
      border-radius: 6px; font-size: 13px; font-weight: bold;
      cursor: pointer; font-family: "Tahoma", sans-serif;
      box-shadow: 0 3px 12px rgba(0,160,210,.4); transition: filter .15s, transform .1s;
      text-decoration: none; margin-top: 2px;
    }
    .sp-visit:hover  { filter: brightness(1.12); transform: translateY(-1px); }
    .sp-visit:active { transform: scale(.97); }

    .browser-loading {
      position: absolute; inset: 0; z-index: 2;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; background: linear-gradient(160deg, #13192a 0%, #0e1220 100%);
      font-family: "Tahoma", sans-serif;
    }
    .browser-loading span { font-size: 44px; animation: arrow-pulse 1.2s ease infinite; }
    .browser-loading p { font-size: 12px; color: #8892aa; }

    /* ── NANO.ORG PAGE REPLICA ── */
    .nano-page {
      width: 100%; height: 100%;
      overflow-y: auto; display: flex; flex-direction: column;
      font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
      background: #fff;
    }
    .nano-page::-webkit-scrollbar { width: 3px; }
    .nano-page::-webkit-scrollbar-thumb { background: #c0c8dc; border-radius: 2px; }

    /* Header */
    .np-header {
      background: #4a62a8; padding: 10px 16px;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .np-logo {
      display: flex; align-items: center; gap: 7px;
      color: #fff; font-size: 17px; font-weight: 700; letter-spacing: .06em;
    }
    .np-logo-sym {
      width: 22px; height: 22px; border: 2.5px solid #fff; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; color: #fff; font-weight: 900; flex-shrink: 0;
    }
    .np-logo-divider { width: 1.5px; height: 18px; background: rgba(255,255,255,.5); }
    .np-header-right { display: flex; align-items: center; gap: 10px; }
    .np-try-btn {
      background: #5b9be0; color: #fff; border: none;
      padding: 7px 16px; border-radius: 20px; font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit;
    }
    .np-menu { color: #fff; font-size: 20px; cursor: pointer; line-height: 1; }

    /* Hero */
    .np-hero {
      background: linear-gradient(180deg, #4a62a8 0%, #3d5a9e 100%);
      padding: 32px 22px 40px; text-align: left;
    }
    .np-hero-label {
      font-size: 11px; color: rgba(255,255,255,.65); letter-spacing: .1em;
      text-transform: uppercase; margin-bottom: 10px;
    }
    .np-hero-headline {
      font-size: 28px; font-weight: 700; color: #fff; line-height: 1.25;
      margin-bottom: 24px; letter-spacing: -.01em;
    }
    .np-hero-nav { display: flex; gap: 10px; }
    .np-hero-nav button {
      width: 38px; height: 38px; border-radius: 50%; border: none;
      background: #5b9be0; color: #fff; font-size: 16px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
    }

    /* Features card */
    .np-features-card {
      background: #fff; border-radius: 18px;
      margin: -18px 14px 0; padding: 22px 18px 26px;
      box-shadow: 0 4px 24px rgba(0,0,0,.13);
      position: relative; z-index: 2;
    }
    .np-features-title {
      font-size: 16px; font-weight: 800; color: #1a2456; line-height: 1.3;
      margin-bottom: 22px;
    }
    .np-feat-row {
      display: flex; align-items: flex-start; gap: 14px; margin-bottom: 20px;
    }
    .np-feat-row:last-child { margin-bottom: 0; }
    .np-feat-icon-wrap {
      width: 44px; height: 44px; flex-shrink: 0; border-radius: 50%;
      background: #e8f0fb; display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    .np-feat-body {}
    .np-feat-name { font-size: 16px; font-weight: 700; color: #1a2456; margin-bottom: 5px; }
    .np-feat-desc { font-size: 13px; color: #555; line-height: 1.5; }

    /* Video / text section */
    .np-video-section {
      background: #f5f7fa; padding: 22px 18px 28px; margin-top: 20px;
    }
    .np-video-thumb {
      width: 100%; border-radius: 14px; overflow: hidden; position: relative;
      margin-bottom: 20px;
    }
    .np-video-thumb img { width: 100%; display: block; }
    .np-play-btn {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      width: 48px; height: 48px; border-radius: 50%;
      background: rgba(91,155,224,.92);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 3px 14px rgba(0,0,0,.35);
    }
    .np-play-btn::after {
      content: ''; border-style: solid;
      border-width: 9px 0 9px 18px; border-color: transparent transparent transparent #fff;
      margin-left: 3px;
    }
    .np-video-title {
      font-size: 20px; font-weight: 800; color: #1a2456; line-height: 1.3;
      margin-bottom: 14px;
    }
    .np-video-body { font-size: 13px; color: #555; line-height: 1.6; margin-bottom: 10px; }
    .np-try-btn-lg {
      display: inline-block; margin-top: 14px;
      background: #5b9be0; color: #fff; border: none;
      padding: 12px 28px; border-radius: 24px; font-size: 14px; font-weight: 600;
      cursor: pointer; font-family: inherit; text-decoration: none;
    }

    /* Use cases */
    .np-usecases { background: #fff; padding: 32px 18px 28px; }
    .np-usecases-title {
      font-size: 24px; font-weight: 800; color: #1a2456; text-align: center;
      line-height: 1.25; margin-bottom: 20px;
    }
    .np-carousel-img {
      width: 100%; border-radius: 12px; overflow: hidden; position: relative;
    }
    .np-carousel-img img { width: 100%; display: block; }
    .np-carousel-label {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,.55));
      color: #fff; font-size: 11px; font-weight: 800; letter-spacing: .12em;
      text-align: center; padding: 20px 10px 12px;
    }
    .np-dots { display: flex; justify-content: center; gap: 6px; margin-top: 14px; }
    .np-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #c0c8d8;
    }
    .np-dot.active { background: #4e6db5; }

    /* Ecosystem */
    .np-ecosystem {
      background: #eef1fb; padding: 28px 18px;
    }
    .np-ecosystem-title {
      font-size: 22px; font-weight: 800; color: #1a2456; text-align: center;
      line-height: 1.25; margin-bottom: 20px;
    }
    .np-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    }
    .np-grid-card {
      background: #fff; border-radius: 12px; padding: 16px 14px;
      display: flex; flex-direction: column; justify-content: space-between;
      min-height: 84px; box-shadow: 0 1px 6px rgba(0,0,0,.06);
      cursor: pointer; text-decoration: none;
    }
    .np-grid-card-name {
      font-size: 14px; font-weight: 700; color: #1a2456;
    }
    .np-grid-card-arrow {
      font-size: 16px; color: #4e85d4; align-self: flex-end;
    }

    /* Footer */
    .np-footer {
      background: #1a2456; padding: 28px 22px 32px;
    }
    .np-footer-logo {
      display: flex; align-items: center; gap: 8px;
      color: #fff; font-size: 18px; font-weight: 700;
      letter-spacing: .06em; margin-bottom: 24px;
    }
    .np-footer-logo .np-logo-sym { border-color: #fff; color: #fff; }
    .np-footer-section { margin-bottom: 20px; }
    .np-footer-heading {
      font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 10px;
    }
    .np-footer-link {
      display: block; font-size: 13px; color: rgba(255,255,255,.65);
      margin-bottom: 7px; text-decoration: none; cursor: pointer;
    }
    .np-footer-link:hover { color: #fff; }

    /* ── NANO-GPT PAGE REPLICA ── */
    .ngpt-page {
      width: 100%; height: 100%; overflow-y: auto;
      display: flex; flex-direction: column;
      font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
      background: radial-gradient(ellipse at 50% 30%, #071830 0%, #040d1a 60%, #020810 100%);
      position: relative;
    }
    .ngpt-page::-webkit-scrollbar { width: 3px; }
    .ngpt-page::-webkit-scrollbar-thumb { background: #1a3a5a; border-radius: 2px; }
    .ngpt-page::before {
      content: ''; position: absolute; inset: 0; pointer-events: none;
      background-image: radial-gradient(circle, rgba(0,200,230,.07) 1px, transparent 1px);
      background-size: 22px 22px;
    }
    .ngpt-nav {
      display: flex; align-items: center; justify-content: flex-end;
      padding: 16px 18px; gap: 10px; flex-shrink: 0; position: relative; z-index: 2;
    }
    .ngpt-sign-in {
      background: transparent; color: #fff; border: 1px solid rgba(255,255,255,.4);
      padding: 7px 16px; border-radius: 20px; font-size: 13px; cursor: pointer; font-family: inherit;
    }
    .ngpt-launch {
      background: linear-gradient(135deg, #00d8c8 0%, #00a8e8 100%);
      color: #fff; border: none; padding: 7px 18px; border-radius: 20px;
      font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;
      box-shadow: 0 2px 12px rgba(0,200,220,.4);
    }
    .ngpt-hero {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 10px 24px 28px; text-align: center; position: relative; z-index: 2;
    }
    .ngpt-gem { width: 72px; height: 82px; position: relative; margin-bottom: 20px; }
    .ngpt-gem-inner {
      width: 100%; height: 100%;
      background: linear-gradient(145deg, #00eed8 0%, #00b8f0 40%, #0090d8 70%, #00c8e0 100%);
      clip-path: polygon(50% 0%, 90% 28%, 75% 100%, 25% 100%, 10% 28%);
    }
    .ngpt-gem-inner::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(145deg, rgba(255,255,255,.45) 0%, transparent 55%);
      clip-path: polygon(50% 0%, 90% 28%, 75% 100%, 25% 100%, 10% 28%);
    }
    .ngpt-headline {
      font-size: 24px; font-weight: 800; color: #fff; line-height: 1.25;
      margin-bottom: 20px; letter-spacing: -.01em;
    }
    .ngpt-headline span { color: #00d8e8; }
    .ngpt-searchbar {
      width: 100%; max-width: 300px; margin-bottom: 22px;
      background: rgba(10,20,40,.8); border: 1px solid rgba(0,200,230,.2);
      border-radius: 28px; padding: 11px 12px 11px 18px;
      display: flex; align-items: center; gap: 10px;
    }
    .ngpt-searchbar-text { flex: 1; font-size: 13px; color: rgba(255,255,255,.55); text-align: left; }
    .ngpt-searchbar-btn {
      width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, #00d8c8, #00a8e8);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 13px; border: none; cursor: pointer;
    }
    .ngpt-actions { display: flex; gap: 14px; margin-bottom: 10px; }
    .ngpt-action-btn {
      width: 48px; height: 48px; border-radius: 50%; border: none; cursor: pointer;
      background: linear-gradient(135deg, #00d8c8 0%, #0098e0 100%);
      color: #fff; font-size: 18px; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(0,200,220,.35);
    }
    .ngpt-features {
      padding: 18px 18px 6px; background: rgba(3,10,28,.65);
      border-top: 1px solid rgba(0,200,230,.1); display: flex; flex-direction: column; gap: 10px;
      position: relative; z-index: 2;
    }
    .ngpt-feat {
      display: flex; align-items: flex-start; gap: 12px;
      background: rgba(255,255,255,.04); border: 1px solid rgba(0,200,230,.1);
      border-radius: 10px; padding: 11px 13px;
    }
    .ngpt-feat-icon { font-size: 17px; flex-shrink: 0; line-height: 1.4; }
    .ngpt-feat-title { font-size: 13px; font-weight: 700; color: #e8f4ff; margin-bottom: 2px; }
    .ngpt-feat-sub   { font-size: 11px; color: rgba(180,210,240,.6); line-height: 1.4; }
    .ngpt-visit {
      display: block; text-align: center; margin: 16px 18px 20px;
      background: linear-gradient(135deg, #00d8c8 0%, #0098e0 100%);
      color: #fff; text-decoration: none; padding: 13px; border-radius: 10px;
      font-size: 14px; font-weight: 700; box-shadow: 0 4px 18px rgba(0,200,220,.3);
      position: relative; z-index: 2;
    }

    /* ── CHAT ── */
    :root {
      --nd: #1a1f2e; --np: #232939; --nb: #2e3650;
      --nt: #e8eaf0; --nm: #8892aa; --na: #00C9FF;
      --nu: #1d3a5c; --nai: #1e2840;
    }

    .chat-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }

    /* ── SCROLL ARROW ── */
    @keyframes arrow-pulse {
      0%,100% { opacity: 1;  transform: translateY(0); }
      50%      { opacity: .6; transform: translateY(3px); }
    }

    #scroll-arrow {
      position: absolute; right: 10px; bottom: 58px;
      background: none; border: none; padding: 0;
      font-size: 26px; line-height: 1;
      cursor: pointer; z-index: 50;
      display: none; align-items: center; justify-content: center;
      color: #00C9FF;
      filter: drop-shadow(0 1px 4px rgba(0,0,0,.55));
      transition: transform .15s, opacity .2s;
      opacity: 0;
    }

    #scroll-arrow.visible   { display: flex; opacity: 1; }
    #scroll-arrow.streaming { animation: arrow-pulse .75s ease infinite; }
    #scroll-arrow:hover     { transform: scale(1.18) translateY(2px); }
    #scroll-arrow:active    { transform: scale(.9); }

    .chat-msgs {
      flex: 1; overflow-y: auto; padding: 8px 7px;
      display: flex; flex-direction: column; gap: 8px; scroll-behavior: smooth;
    }

    .chat-msgs::-webkit-scrollbar { width: 3px; }
    .chat-msgs::-webkit-scrollbar-thumb { background: var(--nb); border-radius: 2px; }

    .msg { display: flex; gap: 5px; width: 100%; animation: fi .2s ease; }

    @keyframes fi {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user      { align-self: flex-end;   flex-direction: row-reverse; }
    .msg.assistant { align-self: flex-start; }

    .av {
      width: 24px; height: 24px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; flex-shrink: 0; margin-top: 2px;
    }

    .msg.user .av      { background: linear-gradient(135deg,#3b5bdb,#4A90E2); color:#fff; }
    .msg.assistant .av { background: linear-gradient(135deg,#00C9FF,#0080c0); font-size: 13px; }

    .bbl {
      padding: 7px 10px; border-radius: 10px;
      font-size: 12px; line-height: 1.55;
      max-width: calc(100% - 30px);
      word-break: break-word; color: var(--nt);
    }

    .msg.user .bbl      { background: var(--nu); border: 1px solid rgba(74,144,226,.25); border-bottom-right-radius: 3px; }
    .msg.assistant .bbl { background: var(--nai); border: 1px solid rgba(0,201,255,.15); border-bottom-left-radius: 3px; }

    .bbl p { margin: 0; }
    .bbl p + p { margin-top: 7px; }
    .bbl strong { color: var(--na); }

    .typing { display: flex; gap: 4px; padding: 5px 2px; align-items: center; }
    .typing span { width: 6px; height: 6px; background: var(--na); border-radius: 50%; animation: bounce 1.2s infinite; }
    .typing span:nth-child(2) { animation-delay: .2s; }
    .typing span:nth-child(3) { animation-delay: .4s; }

    @keyframes bounce {
      0%,60%,100% { transform: translateY(0); }
      30%         { transform: translateY(-6px); }
    }

    .welcome { align-self: center; text-align: center; padding: 12px 8px; }
    .welcome .wi { font-size: 24px; margin-bottom: 6px; }
    .welcome h2 { font-size: 13px; font-weight: 700; color: var(--na); margin-bottom: 5px; }
    .welcome p  { font-size: 11px; color: var(--nm); line-height: 1.5; margin-bottom: 10px; }

    .sugg { display: flex; flex-direction: column; gap: 4px; }

    .sq {
      background: var(--np); border: 1px solid var(--nb); color: var(--nt);
      padding: 6px 9px; border-radius: 7px; cursor: pointer;
      font-size: 11px; text-align: left; font-family: "Tahoma", sans-serif; transition: all .15s;
    }

    .sq:hover { border-color: var(--na); background: rgba(0,201,255,.07); color: var(--na); }

    .chat-input {
      padding: 5px 6px 7px; background: var(--np);
      border-top: 1px solid var(--nb); flex-shrink: 0;
    }

    .input-row {
      display: flex; gap: 5px; align-items: flex-end;
      background: var(--nd); border: 1px solid var(--nb);
      border-radius: 9px; padding: 6px 7px; transition: border-color .2s;
    }

    .input-row:focus-within { border-color: var(--na); box-shadow: 0 0 0 2px rgba(0,201,255,.1); }

    textarea#userInput {
      flex: 1; background: transparent; border: none; outline: none;
      color: var(--nt); font-size: 12px; font-family: "Tahoma", sans-serif;
      resize: none; max-height: 70px; min-height: 18px;
      line-height: 1.4; overflow-y: auto;
    }

    textarea#userInput::placeholder { color: var(--nm); }

    #sendBtn {
      width: 28px; height: 28px; border-radius: 7px; border: none;
      background: linear-gradient(135deg,#00C9FF,#4A90E2);
      color: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: opacity .2s, transform .1s;
    }

    #sendBtn:hover:not(:disabled) { opacity: .85; transform: scale(1.05); }
    #sendBtn:disabled { opacity: .4; cursor: not-allowed; }
    #sendBtn svg { width: 13px; height: 13px; }

    /* ═══════════════════════════
       TASKBAR
    ═══════════════════════════ */
    .taskbar {
      height: 34px;
      background: linear-gradient(180deg,#245cdb 0%,#1a50d0 4%,#1550d4 50%,#0e46c4 51%,#0c40bc 100%);
      border-top: 1px solid #5888f8;
      display: flex; align-items: center;
      padding: 0 4px; gap: 3px;
      flex-shrink: 0; overflow: hidden; position: relative; z-index: 500;
    }

    .start-btn {
      height: 26px; padding: 0 9px 0 5px;
      background: linear-gradient(180deg,#5aad3a 0%,#3d9020 50%,#2e8010 51%,#227010 100%);
      border: 1px solid #1a6010; border-radius: 12px;
      color: #fff; font-size: 12px; font-weight: bold;
      font-family: "Tahoma", sans-serif; cursor: pointer;
      display: flex; align-items: center; gap: 3px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.3), 0 1px 3px rgba(0,0,0,.4);
      text-shadow: 0 1px 1px rgba(0,0,0,.5); flex-shrink: 0;
      transition: filter .1s;
    }

    .start-btn:hover  { filter: brightness(1.1); }
    .start-btn.active { filter: brightness(.88); box-shadow: inset 0 2px 3px rgba(0,0,0,.3); }

    .taskbar-apps { flex: 1; display: flex; gap: 2px; overflow: hidden; align-items: center; min-width: 0; }

    .tb-btn {
      height: 22px; min-width: 0; flex: 1; max-width: 100px;
      background: linear-gradient(180deg,#1a4ab0 0%,#1e58cc 100%);
      border: 1px solid #0a3090; border-radius: 3px;
      color: #fff; font-size: 10px; font-family: "Tahoma", sans-serif;
      display: flex; align-items: center; gap: 3px; padding: 0 5px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.15);
      cursor: pointer; overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
      transition: background .12s, box-shadow .12s, opacity .12s;
    }

    .tb-btn.active {
      background: linear-gradient(180deg,#0e3690 0%,#1244b0 100%);
      box-shadow: inset 0 2px 3px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.1);
    }

    .tb-btn.minimized { opacity: .65; }
    .tb-btn img  { width: 12px; height: 12px; object-fit: contain; }
    .tb-btn span { font-size: 12px; line-height: 1; }

    .tb-clock {
      font-size: 10px; color: #fff;
      text-shadow: 0 1px 2px rgba(0,0,0,.5);
      white-space: nowrap; flex-shrink: 0; padding: 0 4px;
    }

    /* ═══════════════════════════
       WIFI / REPS BUTTON & POPUP
    ═══════════════════════════ */
    .wifi-btn {
      height: 22px; padding: 0 6px; flex-shrink: 0;
      background: transparent; border: none; cursor: pointer;
      color: #fff; font-size: 14px; display: flex; align-items: center;
      border-radius: 3px; transition: background .12s;
      position: relative;
    }
    .wifi-btn:hover { background: rgba(255,255,255,.15); }
    .wifi-btn.active { background: rgba(0,0,0,.25); }

    .wifi-popup {
      display: none; position: fixed; bottom: 38px; right: 48px;
      width: 320px; max-height: 420px;
      background: #ece9d8; border: 1px solid #0055e5;
      box-shadow: 3px 3px 10px rgba(0,0,0,.5);
      border-radius: 4px 4px 0 0; z-index: 9999;
      font-family: "Tahoma", sans-serif; font-size: 11px;
      animation: wifipop-in .15s ease;
      flex-direction: column;
    }
    .wifi-popup.open { display: flex; }
    @keyframes wifipop-in {
      from { transform: translateY(10px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .wifi-popup-head {
      background: linear-gradient(180deg,#0a5cdf 0%,#0845c0 100%);
      color: #fff; padding: 5px 9px; font-weight: bold; font-size: 11px;
      border-radius: 3px 3px 0 0; display: flex; align-items: center; gap: 6px;
      flex-shrink: 0;
    }
    .wifi-popup-head .wp-dot { width:8px;height:8px;border-radius:50%;background:#5dff5d;flex-shrink:0; }
    .wifi-popup-sub {
      font-size:10px; color:#acd8ff; font-weight:normal; margin-left:auto; white-space:nowrap;
    }
    .wifi-popup-list {
      overflow-y: auto; flex: 1;
      max-height: 360px;
    }
    .wifi-popup-list::-webkit-scrollbar { width: 8px; }
    .wifi-popup-list::-webkit-scrollbar-track { background: #ece9d8; }
    .wifi-popup-list::-webkit-scrollbar-thumb { background: #7a9ccc; border-radius: 4px; }
    .wifi-rep {
      display: flex; align-items: center; gap: 7px;
      padding: 5px 9px; border-bottom: 1px solid #d4d0c8; cursor: pointer;
      transition: background .1s;
    }
    .wifi-rep:last-child { border-bottom: none; }
    .wifi-rep:hover { background: #d3e6ff; }
    .wifi-rep-dot { width:7px;height:7px;border-radius:50%;background:#22c55e;flex-shrink:0; }
    .wifi-rep-info { flex:1; min-width:0; }
    .wifi-rep-alias { font-weight:bold; color:#1a1a1a; font-size:11px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .wifi-rep-addr  { color:#555; font-size:9.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-family:monospace; }
    .wifi-rep-meta  { color:#888; font-size:9px; margin-top:1px; }
    .wifi-rep-copy  { font-size:9px; color:#0055e5; flex-shrink:0; opacity:.7; }
    .wifi-rep.copied { background:#d4f7d4; }
    .wifi-rep.copied .wifi-rep-copy { color:#22c55e; }
    .wifi-loading { text-align:center; padding:20px; color:#555; }

    /* ═══════════════════════════
       START MENU / QR POPUP
    ═══════════════════════════ */
    @keyframes start-menu-in  {
      from { transform: translateY(20px) scale(.95); opacity: 0; }
      to   { transform: translateY(0)    scale(1);   opacity: 1; }
    }

    @keyframes start-menu-out {
      from { transform: translateY(0)    scale(1);   opacity: 1; }
      to   { transform: translateY(20px) scale(.95); opacity: 0; }
    }

    .start-menu {
      position: absolute;
      bottom: 38px; left: 4px;
      width: 238px;
      background: #d4d0c8;
      border: 2px solid #0055e5;
      border-radius: 8px 8px 0 0;
      box-shadow: 3px -2px 12px rgba(0,0,0,.45);
      z-index: 9999;
      overflow: hidden;
      display: none;
      flex-direction: column;
      transform-origin: bottom left;
    }

    .start-menu.visible {
      display: flex;
      animation: start-menu-in .2s cubic-bezier(.18,.89,.32,1.28) forwards;
    }

    .start-menu.hiding {
      display: flex;
      animation: start-menu-out .15s ease-in forwards;
    }

    .sm-header {
      background: linear-gradient(90deg, #1a50d0 0%, #1e6cf0 60%, #2080ff 100%);
      padding: 10px 12px;
      display: flex; flex-direction: column; align-items: center; gap: 2px;
    }

    .sm-header h2 {
      color: #fff; font-size: 13px; font-weight: bold;
      text-shadow: 0 1px 3px rgba(0,0,0,.6);
    }

    .sm-header p {
      color: rgba(255,255,255,.8); font-size: 10px;
      font-style: italic; text-shadow: 0 1px 2px rgba(0,0,0,.4);
    }

    .sm-body {
      padding: 14px 12px;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      background: #f0ede8;
    }

    .sm-qr {
      border: 3px solid #1a50d0;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
      cursor: pointer;
      position: relative;
      transition: border-color .2s, box-shadow .2s;
    }

    .sm-qr:hover { border-color: #00C9FF; box-shadow: 0 2px 12px rgba(0,180,255,.4); }
    .sm-qr:active { border-color: #0099cc; }

    .sm-qr img { display: block; width: 180px; height: 180px; }

    .sm-qr .qr-hint {
      position: absolute; inset: 0;
      background: rgba(0,0,0,.55);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity .18s;
      color: #fff; font-size: 11px; font-family: "Tahoma", sans-serif;
      pointer-events: none;
      border-radius: 3px;
    }

    .sm-qr:hover .qr-hint { opacity: 1; }

    .sm-addr {
      font-size: 9px; color: #333;
      text-align: center; word-break: break-all;
      font-family: monospace;
      background: #fff;
      padding: 5px 7px; border-radius: 4px;
      border: 1px solid #bbb;
      width: 100%;
      cursor: pointer;
      transition: background .15s, border-color .15s;
    }

    .sm-addr:hover { background: #e8f4ff; border-color: #00C9FF; }
    .sm-addr:active { background: #cce8ff; }

    /* Copy toast */
    @keyframes toast-in {
      from { opacity: 0; transform: translateX(-50%) translateY(6px) scale(.9); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0)  scale(1); }
    }

    .copy-toast {
      position: absolute;
      bottom: 48px; left: 50%;
      transform: translateX(-50%);
      background: #1a50d0; color: #fff;
      font-size: 11px; font-family: "Tahoma", sans-serif;
      padding: 5px 12px; border-radius: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,.35);
      pointer-events: none; white-space: nowrap;
      animation: toast-in .18s ease forwards;
      z-index: 10001;
    }

    .sm-footer {
      background: #e8e4de;
      border-top: 1px solid #bbb;
      padding: 6px 10px;
      display: flex; justify-content: flex-end;
    }

    .sm-close-btn {
      font-size: 10px; padding: 3px 10px;
      background: linear-gradient(180deg,#fff 0%,#d4d0c8 100%);
      border: 1px solid #888; border-radius: 3px;
      cursor: pointer; font-family: "Tahoma", sans-serif;
      transition: filter .1s;
    }

    .sm-close-btn:hover { filter: brightness(.92); }

    /* Click-outside overlay */
    .menu-overlay {
      position: absolute; inset: 0;
      z-index: 9998; display: none;
    }

    .menu-overlay.visible { display: block; }

    /* ─── nano.org SPA Panel ─── */

<script>
/* ══════════════════════════════════════════
   APP CONFIGS
══════════════════════════════════════════ */
const APPS = {
  nanonerd: {
    id: 'nanonerd', title: 'NanoNerd',
    iconHtml: '<span style="position:relative;display:inline-flex;width:14px;height:14px;align-items:center;justify-content:center;font-size:12px;line-height:1;">🧠<span style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:9px;font-weight:900;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.6);">Ӿ</span></span>',
    tbIconHtml: '<span style="position:relative;display:inline-flex;width:14px;height:14px;align-items:center;justify-content:center;font-size:12px;line-height:1;">🧠<span style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:9px;font-weight:900;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.6);">Ӿ</span></span>',
    type: 'chat', url: null,
  },
  nano_org: {
    id: 'nano_org', title: 'nano.org',
    iconHtml: '<img src="https://www.google.com/s2/favicons?domain=nano.org&sz=64" onerror="this.outerHTML=\'🔵\'">',
    tbIconHtml: '<img src="https://www.google.com/s2/favicons?domain=nano.org&sz=16" onerror="this.outerHTML=\'🔵\'">',
    type: 'browser', url: 'https://nano.org',
    emoji: '🔵', desc: 'The official Nano cryptocurrency website',
  },
  nano_gpt: {
    id: 'nano_gpt', title: 'NanoGPT',
    iconHtml: '<img src="https://www.google.com/s2/favicons?domain=nano-gpt.com&sz=64" onerror="this.outerHTML=\'⚡\'">',
    tbIconHtml: '<img src="https://www.google.com/s2/favicons?domain=nano-gpt.com&sz=16" onerror="this.outerHTML=\'⚡\'">',
    type: 'browser', url: 'https://nano-gpt.com/',
    emoji: '⚡', desc: 'AI-powered tools powered by Nano (XNO)',
  },
  nano_hub: {
    id: 'nano_hub', title: 'Nano Hub',
    iconHtml: '<img src="/nanohub-icon.png">',
    tbIconHtml: '<img src="/nanohub-icon.png" style="height:14px;width:14px;border-radius:50%;object-fit:cover;">',
    type: 'browser', url: 'https://hub.nano.org',
    emoji: '🌐', desc: 'Explore the Nano (XNO) ecosystem',
  },
};

/* ══════════════════════════════════════════
   WINDOW MANAGER
══════════════════════════════════════════ */
const wm = {
  state: {},  // 'closed' | 'open' | 'minimized'
  els: {},    // { win, tbBtn }
  z: 100,
  ANIM_MS: 210,

  init() {
    for (const id of Object.keys(APPS)) {
      this.state[id] = 'closed';
      this.els[id] = { win: null, tbBtn: null };
      this._createWindow(id);
    }
  },

  open(id) {
    const s = this.state[id];
    const { win } = this.els[id];

    if (s === 'closed') {
      win.classList.add('animating');
      win.style.display = 'flex';
      this._addTbBtn(id);
      this.state[id] = 'open';
      void win.offsetWidth; // reflow
      win.classList.remove('animating');
      this._runAnim(win, 'anim-open');
    } else if (s === 'minimized') {
      win.classList.add('animating');
      win.style.display = 'flex';
      this.state[id] = 'open';
      void win.offsetWidth;
      win.classList.remove('animating');
      this._runAnim(win, 'anim-restore');
      this._updateTbBtn(id);
    }
    this.focus(id);
  },

  close(id) {
    const { win } = this.els[id];
    this._runAnim(win, 'anim-close', () => {
      win.style.display = 'none';
      win.classList.remove('maximized');
    });
    this._removeTbBtn(id);
    this.state[id] = 'closed';
  },

  minimize(id) {
    const { win } = this.els[id];
    this._runAnim(win, 'anim-minimize', () => {
      win.style.display = 'none';
    });
    this.state[id] = 'minimized';
    this._updateTbBtn(id);
  },

  maximize(id) {
    const app = APPS[id];
    const { win } = this.els[id];
    const wasMaximized = win.classList.contains('maximized');
    if (!wasMaximized) {
      // Save any dragged position so restore brings it back
      win._dragPos = {
        left: win.style.left, top: win.style.top,
        width: win.style.width, height: win.style.height,
        right: win.style.right, bottom: win.style.bottom,
      };
      // Clear inline styles so the .maximized CSS class takes full control
      ['left','top','right','bottom','width','height'].forEach(p => win.style[p] = '');
      win.classList.add('maximized');
      setTimeout(() => this._runAnim(win, 'anim-maximize'), 230);
    } else {
      win.classList.remove('maximized');
      // Restore saved drag position if the window was previously dragged
      const dp = win._dragPos;
      if (dp && dp.left) {
        win.style.left   = dp.left;
        win.style.top    = dp.top;
        win.style.width  = dp.width;
        win.style.height = dp.height;
        win.style.right  = 'auto';
        win.style.bottom = 'auto';
      }
      this._runAnim(win, 'anim-maximize');
    }
  },

  focus(id) {
    this.z++;
    const { win } = this.els[id];
    win.style.zIndex = this.z;
    this._runAnim(win, 'anim-focus');
    // Sync all taskbar button states
    for (const [wId, { tbBtn }] of Object.entries(this.els)) {
      if (!tbBtn) continue;
      tbBtn.classList.remove('active', 'minimized');
      if (this.state[wId] === 'open')      tbBtn.classList.add('active');
      if (this.state[wId] === 'minimized') tbBtn.classList.add('minimized');
    }
  },

  clickTb(id) {
    if (this.state[id] === 'open') {
      this.minimize(id);
    } else {
      this.open(id);
    }
  },

  /* Helpers */
  _runAnim(win, cls, onEnd) {
    win.classList.remove('anim-open','anim-minimize','anim-restore','anim-close','anim-focus','anim-maximize');
    void win.offsetWidth;
    win.classList.add(cls);
    const done = () => {
      win.classList.remove(cls);
      if (onEnd) onEnd();
    };
    win.addEventListener('animationend', done, { once: true });
  },

  _addTbBtn(id) {
    if (this.els[id].tbBtn) return;
    const app = APPS[id];
    const btn = document.createElement('button');
    btn.className = 'tb-btn active';
    btn.innerHTML = `${app.tbIconHtml} ${app.title}`;
    btn.onclick = () => this.clickTb(id);
    document.getElementById('tb-apps').appendChild(btn);
    this.els[id].tbBtn = btn;
  },

  _removeTbBtn(id) {
    const { tbBtn } = this.els[id];
    if (tbBtn) { tbBtn.remove(); this.els[id].tbBtn = null; }
  },

  _updateTbBtn(id) {
    const { tbBtn } = this.els[id];
    if (!tbBtn) return;
    tbBtn.classList.remove('active', 'minimized');
    if (this.state[id] === 'open')      tbBtn.classList.add('active');
    if (this.state[id] === 'minimized') tbBtn.classList.add('minimized');
  },

  _createWindow(id) {
    const app = APPS[id];
    const area = document.getElementById('win-area');

    const win = document.createElement('div');
    win.className = 'xp-win';
    win.id = `win-${id}`;
    win.style.zIndex = 10;

    /* Bring to front on any interaction */
    win.addEventListener('mousedown',  () => { if (this.state[id]==='open') this.focus(id); });
    win.addEventListener('touchstart', () => { if (this.state[id]==='open') this.focus(id); }, {passive:true});

    /* Title bar */
    const tb = document.createElement('div');
    tb.className = 'xp-titlebar';
    const maxTitle = app.type === 'browser' ? 'Open in browser' : 'Maximize / Restore';
    tb.innerHTML = `

const drag = {
  active: false, id: null,
  startCX: 0, startCY: 0, startLeft: 0, startTop: 0,

  start(id, cx, cy) {
    const { win } = wm.els[id];
    if (win.classList.contains('maximized')) return;

    /* Snap to explicit pixel position (removes right/bottom auto-sizing) */
    const rect     = win.getBoundingClientRect();
    const areaRect = document.getElementById('win-area').getBoundingClientRect();
    win.style.width  = rect.width  + 'px';
    win.style.height = rect.height + 'px';
    win.style.right  = 'auto';
    win.style.bottom = 'auto';
    win.style.left   = (rect.left - areaRect.left) + 'px';
    win.style.top    = (rect.top  - areaRect.top)  + 'px';

    this.active    = true;
    this.id        = id;
    this.startCX   = cx;
    this.startCY   = cy;
    this.startLeft = parseFloat(win.style.left)  || 0;
    this.startTop  = parseFloat(win.style.top)   || 0;

    win.style.transition = 'none';
    win.style.userSelect = 'none';
    wm.focus(id);
  },

  move(cx, cy) {
    if (!this.active) return;
    const { win } = wm.els[this.id];
    const areaRect  = document.getElementById('win-area').getBoundingClientRect();
    const shellRect = document.getElementById('app-shell').getBoundingClientRect();

    let newLeft = this.startLeft + (cx - this.startCX);
    let newTop  = this.startTop  + (cy - this.startCY);

    /* Clamp: keep title bar reachable within app-shell */
    const minLeft = shellRect.left - areaRect.left;              /* left edge of shell */
    const maxLeft = shellRect.right - areaRect.left - 50;        /* 50 px grip from right */
    const maxTop  = areaRect.height - 26;                        /* title bar stays visible */

    newLeft = Math.max(minLeft, Math.min(maxLeft, newLeft));
    newTop  = Math.max(0,       Math.min(maxTop,  newTop));

    win.style.left = newLeft + 'px';
    win.style.top  = newTop  + 'px';
  },

  end() {
    if (!this.active) return;
    const { win } = wm.els[this.id];
    win.style.transition = '';
    win.style.userSelect = '';
    this.active = false;
    this.id     = null;
  },
};

/* Attach global move / end listeners once */
document.addEventListener('mousemove', e => drag.move(e.clientX, e.clientY));
document.addEventListener('mouseup',   () => drag.end());
document.addEventListener('touchmove', e => {
  if (drag.active) { e.preventDefault(); drag.move(e.touches[0].clientX, e.touches[0].clientY); }
}, { passive: false });
document.addEventListener('touchend',  () => drag.end());

let startMenuOpen = false;

function toggleStartMenu() {

  const menu = document.getElementById('start-menu');
  const overlay = document.getElementById('menu-overlay');

  const overlay = document.getElementById('menu-overlay');
  const btn = document.getElementById('start-btn');
  menu.classList.add('hiding');
  overlay.classList.remove('visible');

  menu.addEventListener('animationend', () => {

/* ══════════════════════════════════════════
   COPY NANO ADDRESS
══════════════════════════════════════════ */
const NANO_ADDR = 'nano_1z67kr1o6dyb3sdafc87asua9eegdfxcpsqg7qihb49zmrmorncy1fnki84z';
let copyToastTimer = null;

function copyNanoAddr() {
  navigator.clipboard.writeText(NANO_ADDR).then(() => {
    showCopyToast('✅ Address copied!');
  }).catch(() => {
    /* Fallback for browsers that block clipboard */
    try {
      const ta = document.createElement('textarea');
      ta.value = NANO_ADDR;
      ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0';
      document.body.appendChild(ta);
      ta.select(); document.execCommand('copy');
      document.body.removeChild(ta);
      showCopyToast('✅ Address copied!');
    } catch { showCopyToast('⚠️ Copy failed'); }
  });
}

function showCopyToast(msg) {
  if (copyToastTimer) clearTimeout(copyToastTimer);
  const existing = document.querySelector('.copy-toast');
  if (existing) existing.remove();
  const toast = document.createElement('div');
  toast.className = 'copy-toast';
  toast.textContent = msg;
  document.getElementById('app-shell').appendChild(toast);
  copyToastTimer = setTimeout(() => { toast.remove(); copyToastTimer = null; }, 2000);
}

/* ══════════════════════════════════════════
   WIFI / NANO REPRESENTATIVES
══════════════════════════════════════════ */
let wifiOpen = false;
let wifiLoaded = false;

function toggleWifiPopup() {
  const popup = document.getElementById('wifi-popup');
  const btn   = document.getElementById('wifi-btn');
  wifiOpen = !wifiOpen;
  popup.classList.toggle('open', wifiOpen);
  btn.classList.toggle('active', wifiOpen);
  if (wifiOpen && !wifiLoaded) loadNanoReps();
}

function closeWifiPopup() {
  wifiOpen = false;
  document.getElementById('wifi-popup').classList.remove('open');
  document.getElementById('wifi-btn').classList.remove('active');
}

async function loadNanoReps() {
  const list = document.getElementById('wifi-list');
  const countEl = document.getElementById('wifi-count');
  try {
    const res  = await fetch('/api/nano-reps');
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    const reps = data.reps;
    wifiLoaded = true;
    countEl.textContent = reps.length + ' reps';
    if (!reps.length) {
      list.innerHTML = '<div class="wifi-loading">No representatives found.</div>';
      return;
    }
    list.innerHTML = reps.map(r => {
      const display  = r.alias || (r.account.slice(0,13) + '…' + r.account.slice(-6));
      const uptime   = r.uptimePercentage ?? 100;
      const dotColor = uptime >= 90 ? '#22c55e' : uptime >= 50 ? '#f59e0b' : '#ef4444';
      const dotTitle = uptime + '% uptime';
      const meta     = [
        r.weight > 0 ? r.weight.toFixed(2) + '% weight' : null,
        r.version    ? 'v' + r.version : null,
      ].filter(Boolean).join(' · ');
      return `<div class="wifi-rep" onclick="copyRepAddr(this,'${r.account}')">
        <div class="wifi-rep-dot" style="background:${dotColor}" title="${dotTitle}"></div>
        <div class="wifi-rep-info">
          <div class="wifi-rep-alias">${escHtml(display)}</div>
          <div class="wifi-rep-addr">${r.account}</div>
          ${meta ? `<div class="wifi-rep-meta">${escHtml(meta)}</div>` : ''}
        </div>
        <div class="wifi-rep-copy">copy</div>
      </div>`;
    }).join('');
  } catch(e) {
    list.innerHTML = '<div class="wifi-loading">⚠️ Could not load representatives.</div>';
  }
}

function copyRepAddr(el, addr) {
  navigator.clipboard.writeText(addr).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = addr; ta.style.cssText='position:fixed;opacity:0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
  });
  el.classList.add('copied');
  el.querySelector('.wifi-rep-copy').textContent = '✓ copied';
  setTimeout(() => {
    el.classList.remove('copied');
    el.querySelector('.wifi-rep-copy').textContent = 'copy';
  }, 1800);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* close wifi popup when clicking outside */
document.addEventListener('click', e => {
  if (wifiOpen && !e.target.closest('#wifi-popup') && !e.target.closest('#wifi-btn')) {
    closeWifiPopup();
  }
});

/* ══════════════════════════════════════════
   CHAT ENGINE
══════════════════════════════════════════ */
let conversationHistory = [];
let isStreaming  = false;
let autoScroll   = true;  /* tracks whether to follow stream */

const SUGGESTIONS = [
  "What makes Nano different from Bitcoin?",
  "How does Nano achieve zero transaction fees?",
  "What is the block-lattice structure?",
  "How fast are Nano transactions?",
  "What is Open Representative Voting?",
];

function getEl(id) { return document.getElementById(id); }

/* ── Scroll-arrow helpers ── */
function isAtBottom(chat) {
  return chat.scrollHeight - chat.scrollTop - chat.clientHeight < 15;
}

function updateScrollArrow() {
  const chat  = getEl('chat');
  const arrow = getEl('scroll-arrow');
  if (!chat || !arrow) return;
  const overflows = chat.scrollHeight > chat.clientHeight + 5;
  if (overflows && !isAtBottom(chat)) {
    arrow.classList.add('visible');
  } else {
    arrow.classList.remove('visible');
  }
}

function clickScrollArrow() {
  const chat = getEl('chat');
  if (!chat) return;
  autoScroll = true;                    /* re-enable follow during streaming */
  chat.scrollTo({ top: chat.scrollHeight, behavior: 'instant' });
  updateScrollArrow();
}

/* Called once after the NanoNerd window opens */
function setupChatScroll() {
  const chat = getEl('chat');
  if (!chat || chat._scrollBound) return;
  chat._scrollBound = true;
  chat.addEventListener('scroll', () => {
    autoScroll = isAtBottom(chat);
    updateScrollArrow();
  });
}

/* ── Chat helpers ── */
function showWelcome() {
  const chat = getEl('chat');
  if (!chat) return;
  const w = document.createElement('div');
  w.className = 'welcome'; w.id = 'welcome';
  w.innerHTML = `
    <div class="wi">🥦</div>
    <h2>Welcome to NanoNerd 🧠</h2>
    <p>Your dedicated Nano (XNO) expert.<br>Ask me anything!</p>
    <div class="sugg">
      ${SUGGESTIONS.map(q=>`<button class="sq">${q}</button>`).join('')}
    </div>
  `;
  chat.appendChild(w);
  w.querySelectorAll('.sq').forEach(btn => btn.addEventListener('click', () => sendMsg(btn.textContent)));
}

function removeWelcome() { const el=getEl('welcome'); if(el) el.remove(); }

function addMsg(role, text, noScroll) {
  const chat = getEl('chat');
  if (!chat) return null;
  const msg = document.createElement('div'); msg.className=`msg ${role}`;
  const av  = document.createElement('div'); av.className='av';
  av.textContent = role==='user' ? 'You' : '🧠';
  const bbl = document.createElement('div'); bbl.className='bbl';
  bbl.innerHTML = fmt(text);
  msg.appendChild(av); msg.appendChild(bbl);
  chat.appendChild(msg);
  if (!noScroll) { chat.scrollTop = chat.scrollHeight; }
  updateScrollArrow();
  return bbl;
}

function addTyping() {
  const chat = getEl('chat'); if (!chat) return;
  const msg = document.createElement('div'); msg.className='msg assistant'; msg.id='typing';
  const av  = document.createElement('div'); av.className='av'; av.textContent='🧠';
  const bbl = document.createElement('div'); bbl.className='bbl';
  bbl.innerHTML='<div class="typing"><span></span><span></span><span></span></div>';
  msg.appendChild(av); msg.appendChild(bbl);
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;   /* always show typing indicator */
  updateScrollArrow();
}

function removeTyping() { const el=getEl('typing'); if(el) el.remove(); }

function fmt(text) {
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>')
    .replace(/^/,'<p>').replace(/$/,'</p>');
}

async function sendMsg(text) {
  if (isStreaming || !text.trim()) return;
  const inputEl=getEl('userInput'), sendEl=getEl('sendBtn');
  if (!inputEl||!sendEl) return;
  removeWelcome();
  isStreaming=true; sendEl.disabled=true;
  inputEl.value=''; inputEl.style.height='auto';
  const userText=text.trim();
  autoScroll=true;                          /* scroll to show user msg + typing */
  addMsg('user', userText);
  conversationHistory.push({role:'user',content:userText});
  addTyping();

  const arrow = getEl('scroll-arrow');

  let fullResponse='';
  try {
    const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:conversationHistory})});
    if (!res.ok) throw new Error('fail');
    removeTyping();
    autoScroll=false;                        /* LOCK: reply scroll locked until arrow click */
    const bbl=addMsg('assistant','',true);   /* no auto-scroll on insert */
    if(bbl) bbl.innerHTML='';
    if(arrow) arrow.classList.add('streaming');
    updateScrollArrow();                     /* show arrow immediately */

    const reader=res.body.getReader(); const dec=new TextDecoder(); let buf='';
    while(true){
      const {done,value}=await reader.read(); if(done)break;
      buf+=dec.decode(value,{stream:true});
      const lines=buf.split('\n'); buf=lines.pop()||'';
      for(const line of lines){
        if(!line.startsWith('data: '))continue;
        try{
          const ev=JSON.parse(line.slice(6));
          if(ev.done) break;
          if(ev.content && bbl){
            fullResponse+=ev.content;
            bbl.innerHTML=fmt(fullResponse);
            const chat=getEl('chat');
            if(chat && autoScroll) chat.scrollTo({ top: chat.scrollHeight, behavior: 'instant' });
            updateScrollArrow();
          }
        }catch{}
      }
    }
    conversationHistory.push({role:'assistant',content:fullResponse});
  } catch(err) {
    removeTyping(); addMsg('assistant','Something went wrong. Please try again.');
  } finally {
    isStreaming=false; if(sendEl) sendEl.disabled=false;
    if(arrow) arrow.classList.remove('streaming');
    updateScrollArrow();
  }
}

/* Input events */
document.addEventListener('input', e => {
  if (e.target?.id==='userInput') {
    e.target.style.height='auto';
    e.target.style.height=Math.min(e.target.scrollHeight,70)+'px';
  }
});
document.addEventListener('keydown', e => {
  if (e.target?.id==='userInput'&&e.key==='Enter'&&!e.shiftKey) {
    e.preventDefault(); sendMsg(e.target.value);
  }
});
document.addEventListener('click', e => {
  if (e.target?.closest('#sendBtn')) { const inp=getEl('userInput'); if(inp) sendMsg(inp.value); }
});

const NORG_WORDS = ['accept payments','send remittances','play games','trade globally','bank without borders'];
let norgWordIdx = 0;
function nanoNav(page) {
  const body = document.getElementById('norg-body');
  if (!body) return;
  body.querySelectorAll('.norg-view').forEach(v => v.classList.remove('no-visible'));
  const target = document.getElementById('norg-' + page);
  if (target) { target.classList.add('no-visible'); body.scrollTop = 0; }
  body.closest('.norg-page').querySelectorAll('.norg-nav-link').forEach(a => {
    a.classList.toggle('no-active', a.dataset.page === page);
  });
}
function norgHeroNext() {
  norgWordIdx = (norgWordIdx + 1) % NORG_WORDS.length;
  const w = document.getElementById('norg-hero-word');
  if (w) w.textContent = NORG_WORDS[norgWordIdx];
  document.querySelectorAll('.norg-hero-dot').forEach((d,i) => d.classList.toggle('ndot-active', i === norgWordIdx));
}
setInterval(norgHeroNext, 2800);

wm.open('nanonerd');
showWelcome();
