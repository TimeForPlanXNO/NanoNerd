<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XNO Guide — Nano Chat</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --nano-blue: #4A90E2;
      --nano-dark: #1a1f2e;
      --nano-panel: #232939;
      --nano-border: #2e3650;
      --nano-text: #e8eaf0;
      --nano-muted: #8892aa;
      --nano-accent: #00C9FF;
      --nano-user-bg: #1d3a5c;
      --nano-ai-bg: #1e2840;
      --radius: 16px;
    }

    body {
      background: var(--nano-dark);
      color: var(--nano-text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: var(--nano-panel);
      border-bottom: 1px solid var(--nano-border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .logo {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, #00C9FF, #4A90E2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 16px;
      color: #fff;
      flex-shrink: 0;
    }

    .header-text h1 {
      font-size: 17px;
      font-weight: 700;
      color: var(--nano-accent);
    }

    .header-text p {
      font-size: 12px;
      color: var(--nano-muted);
      margin-top: 1px;
    }

    .status-dot {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #4ade80;
    }

    .status-dot::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .chat-container::-webkit-scrollbar {
      width: 4px;
    }

    .chat-container::-webkit-scrollbar-track {
      background: transparent;
    }

    .chat-container::-webkit-scrollbar-thumb {
      background: var(--nano-border);
      border-radius: 2px;
    }

    .message {
      display: flex;
      gap: 10px;
      max-width: 760px;
      width: 100%;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .message.assistant {
      align-self: flex-start;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .message.user .avatar {
      background: linear-gradient(135deg, #3b5bdb, #4A90E2);
      color: #fff;
    }

    .message.assistant .avatar {
      background: linear-gradient(135deg, #00C9FF, #0080c0);
      color: #fff;
    }

    .bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 14.5px;
      line-height: 1.65;
      max-width: calc(100% - 44px);
      word-break: break-word;
    }

    .message.user .bubble {
      background: var(--nano-user-bg);
      border: 1px solid rgba(74, 144, 226, 0.25);
      border-bottom-right-radius: 4px;
    }

    .message.assistant .bubble {
      background: var(--nano-ai-bg);
      border: 1px solid rgba(0, 201, 255, 0.15);
      border-bottom-left-radius: 4px;
    }

    .bubble p { margin: 0; }
    .bubble p + p { margin-top: 10px; }

    .bubble strong {
      color: var(--nano-accent);
    }

    .typing-indicator {
      display: flex;
      gap: 5px;
      padding: 8px 4px;
      align-items: center;
    }

    .typing-indicator span {
      width: 7px;
      height: 7px;
      background: var(--nano-accent);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-8px); }
    }

    .welcome {
      align-self: center;
      text-align: center;
      max-width: 480px;
      padding: 32px 20px;
    }

    .welcome .icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #00C9FF, #4A90E2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin: 0 auto 16px;
    }

    .welcome h2 {
      font-size: 22px;
      font-weight: 700;
      color: var(--nano-accent);
      margin-bottom: 10px;
    }

    .welcome p {
      font-size: 14px;
      color: var(--nano-muted);
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .suggested-questions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
    }

    .suggestion-btn {
      background: var(--nano-panel);
      border: 1px solid var(--nano-border);
      color: var(--nano-text);
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 13px;
      text-align: left;
      transition: all 0.15s ease;
    }

    .suggestion-btn:hover {
      border-color: var(--nano-accent);
      background: rgba(0, 201, 255, 0.07);
      color: var(--nano-accent);
    }

    .input-area {
      padding: 12px 16px 16px;
      background: var(--nano-panel);
      border-top: 1px solid var(--nano-border);
      flex-shrink: 0;
    }

    .input-wrapper {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      max-width: 760px;
      margin: 0 auto;
      background: var(--nano-dark);
      border: 1px solid var(--nano-border);
      border-radius: 14px;
      padding: 10px 12px;
      transition: border-color 0.2s;
    }

    .input-wrapper:focus-within {
      border-color: var(--nano-accent);
      box-shadow: 0 0 0 2px rgba(0, 201, 255, 0.1);
    }

    textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--nano-text);
      font-size: 14px;
      font-family: inherit;
      resize: none;
      max-height: 120px;
      min-height: 24px;
      line-height: 1.5;
      overflow-y: auto;
    }

    textarea::placeholder {
      color: var(--nano-muted);
    }

    .send-btn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #00C9FF, #4A90E2);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s, transform 0.1s;
    }

    .send-btn:hover:not(:disabled) {
      opacity: 0.85;
      transform: scale(1.05);
    }

    .send-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .send-btn svg {
      width: 17px;
      height: 17px;
    }

    .input-hint {
      text-align: center;
      font-size: 11px;
      color: var(--nano-muted);
      margin-top: 8px;
    }

    @media (max-width: 600px) {
      .message {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">N</div>
    <div class="header-text">
      <h1>XNO Guide</h1>
      <p>Your Nano cryptocurrency expert</p>
    </div>
    <div class="status-dot">Online</div>
  </header>

  <div class="chat-container" id="chat"></div>

  <div class="input-area">
    <div class="input-wrapper">
      <textarea
        id="userInput"
        placeholder="Ask anything about Nano (XNO)..."
        rows="1"
      ></textarea>
      <button class="send-btn" id="sendBtn" title="Send message">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <div class="input-hint">Press Enter to send &nbsp;·&nbsp; Shift+Enter for new line</div>
  </div>

  <script>
    const chat = document.getElementById("chat");
    const userInput = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");

    let conversationHistory = [];
    let isStreaming = false;

    const suggestions = [
      "What makes Nano (XNO) different from Bitcoin?",
      "How does Nano achieve zero transaction fees?",
      "What is the block-lattice structure in Nano?",
      "How fast are Nano transactions compared to other cryptos?",
      "What is Open Representative Voting (ORV) in Nano?",
    ];

    function showWelcome() {
      const welcome = document.createElement("div");
      welcome.className = "welcome";
      welcome.id = "welcome";
      welcome.innerHTML = `
        <div class="icon">⚡</div>
        <h2>Welcome to XNO Guide</h2>
        <p>I'm your dedicated Nano (XNO) cryptocurrency assistant. Ask me anything — I'll always bring it back to Nano.</p>
        <div class="suggested-questions">
          ${suggestions.map(q => `<button class="suggestion-btn">${q}</button>`).join("")}
        </div>
      `;
      chat.appendChild(welcome);

      welcome.querySelectorAll(".suggestion-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          sendMessage(btn.textContent);
        });
      });
    }

    function removeWelcome() {
      const welcome = document.getElementById("welcome");
      if (welcome) welcome.remove();
    }

    function addMessage(role, text) {
      const msg = document.createElement("div");
      msg.className = `message ${role}`;

      const avatar = document.createElement("div");
      avatar.className = "avatar";
      avatar.textContent = role === "user" ? "You" : "XNO";

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.innerHTML = formatText(text);

      msg.appendChild(avatar);
      msg.appendChild(bubble);
      chat.appendChild(msg);
      scrollToBottom();
      return bubble;
    }

    function addTypingIndicator() {
      const msg = document.createElement("div");
      msg.className = "message assistant";
      msg.id = "typing";

      const avatar = document.createElement("div");
      avatar.className = "avatar";
      avatar.textContent = "XNO";

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div>`;

      msg.appendChild(avatar);
      msg.appendChild(bubble);
      chat.appendChild(msg);
      scrollToBottom();
      return msg;
    }

    function removeTypingIndicator() {
      const el = document.getElementById("typing");
      if (el) el.remove();
    }

    function formatText(text) {
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
        .replace(/\*(.*?)\*/g, "<em>$1</em>")
        .replace(/\n\n/g, "</p><p>")
        .replace(/\n/g, "<br>")
        .replace(/^/, "<p>")
        .replace(/$/, "</p>");
    }

    function scrollToBottom() {
      requestAnimationFrame(() => {
        chat.scrollTop = chat.scrollHeight;
      });
    }

    async function sendMessage(text) {
      if (isStreaming || !text.trim()) return;

      removeWelcome();
      isStreaming = true;
      sendBtn.disabled = true;
      userInput.value = "";
      autoResize();

      const userText = text.trim();
      addMessage("user", userText);

      conversationHistory.push({ role: "user", content: userText });

      const typingEl = addTypingIndicator();
      let fullResponse = "";

      try {
        const response = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages: conversationHistory }),
        });

        if (!response.ok) throw new Error("Request failed");

        removeTypingIndicator();
        const assistantBubble = addMessage("assistant", "").parentElement.querySelector(".bubble");
        assistantBubble.innerHTML = "";

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split("\n");
          buffer = lines.pop() || "";

          for (const line of lines) {
            if (!line.startsWith("data: ")) continue;
            try {
              const event = JSON.parse(line.slice(6));
              if (event.done) break;
              if (event.content) {
                fullResponse += event.content;
                assistantBubble.innerHTML = formatText(fullResponse);
                scrollToBottom();
              }
            } catch {}
          }
        }

        conversationHistory.push({ role: "assistant", content: fullResponse });
      } catch (err) {
        removeTypingIndicator();
        addMessage("assistant", "Sorry, something went wrong. Please try again.");
        console.error(err);
      } finally {
        isStreaming = false;
        sendBtn.disabled = false;
        userInput.focus();
      }
    }

    function autoResize() {
      userInput.style.height = "auto";
      userInput.style.height = Math.min(userInput.scrollHeight, 120) + "px";
    }

    userInput.addEventListener("input", autoResize);

    userInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage(userInput.value);
      }
    });

    sendBtn.addEventListener("click", () => {
      sendMessage(userInput.value);
    });

    showWelcome();
  </script>
</body>
</html>
